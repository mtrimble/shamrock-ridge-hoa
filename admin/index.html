<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shamrock Ridge HOA — Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    #vendor-approval-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 99999;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a5c2e;
      color: #fff;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    #vendor-approval-btn:hover {
      background: #22773b;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    #vendor-approval-btn svg {
      flex-shrink: 0;
    }
    #vendor-approval-badge {
      display: none;
      background: #e53e3e;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      padding: 0 4px;
      line-height: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <a id="vendor-approval-btn" href="/admin/vendors.html" title="Vendor Approvals">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
      <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
      <path d="M16 3H8l-2 4h12l-2-4z"/>
      <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
    </svg>
    Vendor Approvals
    <span id="vendor-approval-badge"></span>
  </a>
  <script>
    // Fetch pending count and show badge if > 0
    (async () => {
      try {
        const res = await fetch('/api/vendor-submissions');
        if (!res.ok) return;
        const data = await res.json();
        const count = Array.isArray(data) ? data.length : (data.submissions ? data.submissions.length : 0);
        if (count > 0) {
          const badge = document.getElementById('vendor-approval-badge');
          badge.textContent = count;
          badge.style.display = 'inline-block';
        }
      } catch (e) { /* fail silently */ }
    })();
  </script>
  <!-- Decap CMS loads the full editor UI here -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
